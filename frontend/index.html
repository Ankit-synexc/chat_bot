<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synexc AI — Intelligent Knowledge Assistant</title>
    <meta name="description" content="Ask questions and get intelligent answers powered by Synexc AI's knowledge base.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">

        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>Synexc AI</h1>
                    <span class="tagline">Intelligent Knowledge Assistant</span>
                </div>
            </div>
            <button class="new-chat-btn" id="new-chat-btn" title="Start new conversation">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Chat
            </button>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">

            <!-- Welcome screen shown when no messages -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <h2>How can I help you today?</h2>
                <p>Ask me anything from the knowledge base. I'll find the most relevant information for you.</p>
                <div class="suggestion-chips">
                    <button class="chip" data-question="What services does this company offer?">What services does this company offer?</button>
                    <button class="chip" data-question="Tell me about the team">Tell me about the team</button>
                    <button class="chip" data-question="What technologies are used?">What technologies are used?</button>
                </div>
            </div>

            <!-- Messages rendered here -->
            <div class="messages-container" id="messages-container"></div>

        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <form id="chat-form" class="input-form">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Type your question..." rows="1" autocomplete="off"></textarea>
                    <button type="submit" class="send-btn" id="send-btn" title="Send message" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">Synexc AI may make mistakes. Verify important information.</p>
            </form>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
